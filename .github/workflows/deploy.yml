name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd ~/Sentiment-Analysis
            git pull origin main
            pkill -f streamlit || true
            sleep 2
            nohup streamlit run app.py --server.port 8501 --server.headless true > ~/streamlit.log 2>&1 </dev/null &
            disown
            echo "App started!"